services:
  veille:
    image: directjnzh/veille-novabanq:latest
    build: .
    container_name: veille-novabanq
    volumes:
      - ./config:/app/config
      - ./scripts:/app/scripts
      - ./reports:/app/reports
      - ./logs:/app/logs
    restart: "no"

  dashboard:
    image: python:3.11-slim
    container_name: veille-dashboard
    working_dir: /web
    command: python -m http.server 8080
    volumes:
      - ./web:/web
      - ./reports:/web/reports
    ports:
      - "8080:8080"
    restart: "no"

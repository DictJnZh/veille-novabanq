<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>NovaBanq Threat Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:40px;
}

h1{
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:25px;
}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.btn-all{background:#333;color:white;}
.btn-critical{background:#6a1b9a;color:white;}
.btn-high{background:#c62828;color:white;}
.btn-medium{background:#ef6c00;color:white;}
.btn-low{background:#2e7d32;color:white;}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
border-left:6px solid #ddd;
}

.card.critique{border-left-color:#6a1b9a;}
.card.high{border-left-color:#c62828;}
.card.medium{border-left-color:#ef6c00;}
.card.low{border-left-color:#2e7d32;}

.tag{
background:#eee;
padding:3px 8px;
margin-right:5px;
border-radius:12px;
font-size:12px;
}

</style>
</head>

<body>

<h1>NovaBanq Cyber Threat Dashboard</h1>
<div class="subtitle">Visualisation des vulnérabilités détectées</div>

<div>

<button class="btn-all" onclick="filterThreats('all')">Toutes</button>

<button class="btn-critical" onclick="filterThreats('Critique')">
Vulnérabilités critiques
</button>

<button class="btn-high" onclick="filterThreats('Élevée')">
Criticité élevée
</button>

<button class="btn-medium" onclick="filterThreats('Moyenne')">
Criticité moyenne
</button>

<button class="btn-low" onclick="filterThreats('Faible')">
Criticité faible
</button>

</div>

<br>

<canvas id="chart"></canvas>

<br>

<div id="articles"></div>

<script>

let allData=[]

fetch("reports/report.json")
.then(res=>res.json())
.then(data=>{

allData=data

renderArticles(data)
renderChart(data)

})

function filterThreats(level){

if(level==="all"){
renderArticles(allData)
return
}

const filtered=allData.filter(a=>a.criticality===level)

renderArticles(filtered)

}

function renderArticles(data){

const container=document.getElementById("articles")
container.innerHTML=""

data.forEach(a=>{

let css="low"

if(a.criticality==="Critique") css="critique"
if(a.criticality==="Élevée") css="high"
if(a.criticality==="Moyenne") css="medium"

container.innerHTML+=`

<div class="card ${css}">

<h3>${a.title}</h3>

<p>
<b>Score :</b> ${a.score}
</p>

<p>
<b>Criticité :</b> ${a.criticality}
</p>

<p>
<b>Catégorie :</b> ${a.category}
</p>

<p>
<b>Mots clés :</b>
${a.keywords.map(k=>`<span class="tag">${k}</span>`).join("")}
</p>

<p>
<a href="${a.link}" target="_blank">
Lire l'article
</a>
</p>

</div>

`

})

}

function renderChart(data){

let critical=0
let high=0
let medium=0
let low=0

data.forEach(a=>{

if(a.criticality==="Critique") critical++
if(a.criticality==="Élevée") high++
if(a.criticality==="Moyenne") medium++
if(a.criticality==="Faible") low++

})

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:["Critique","Élevée","Moyenne","Faible"],
datasets:[{
label:"Vulnérabilités détectées",
data:[critical,high,medium,low]
}]
}

})

}

</script>

</body>
</html>
